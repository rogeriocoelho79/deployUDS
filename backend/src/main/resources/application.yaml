spring:
  application:
    name: uds

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/gedDcoumentos?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: "root"
    password: "root@1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    check-location: true
    locations: classpath:db/migration
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

api:
  security:
    token:
      secret: ${JWT_SECRET:minha-chave-secreta-padrao-123}

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    com.teste.uds: DEBUG
